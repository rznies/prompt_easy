<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prompt Easy</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="improveView" class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>Prompt Easy</h1>
      </div>
      <button id="goToSettingsBtn" class="icon-btn" title="Settings">⚙️</button>
    </header>

    <main>
      <div class="input-section">
        <label for="inputPrompt">Your Raw Prompt</label>
        <textarea id="inputPrompt" placeholder="Enter your vague prompt here (e.g., 'marketing plan' or 'write code')..." autofocus></textarea>
        <div class="stats">
          <span id="charCount">0 characters</span>
          <span id="tokenEstimate">~0 tokens</span>
        </div>
      </div>

      <div class="actions">
        <button id="improveBtn" class="primary-btn">Improve Prompt</button>
      </div>

      <div id="loadingOverlay" class="hidden">
        <div class="spinner"></div>
        <p>Enhancing your prompt...</p>
      </div>

      <div class="output-section">
        <div class="output-header">
          <label for="outputPrompt">Improved Prompt</label>
          <button id="copyBtn" class="secondary-btn" disabled>Copy</button>
        </div>
        <textarea id="outputPrompt" placeholder="Improved prompt will appear here..." readonly></textarea>
      </div>
    </main>
  </div>

  <div id="settingsView" class="container hidden">
    <header>
      <button id="backToImproveBtn" class="icon-btn" title="Back">⬅️</button>
      <h1>Settings</h1>
      <div style="width: 32px;"></div>
    </header>

    <main>
      <section class="settings-group">
        <h2>API Key (BYOK)</h2>
        <div class="field">
          <label for="apiKeyInput">Gemini API Key</label>
          <input type="password" id="apiKeyInput" placeholder="Enter your Google AI Studio key...">
          <p class="help-text">Get your key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</p>
        </div>
        <div class="status-indicator" id="keyStatus">
          <span class="status-dot grey"></span>
          <span class="status-text">Not configured</span>
        </div>
        <button id="saveKeyBtn" class="primary-btn">Save API Key</button>
      </section>

      <section class="settings-group">
        <h2>Configuration</h2>
        <div class="field">
          <label for="modelSelect">Preferred Model</label>
          <select id="modelSelect">
            <option value="gemini-3-flash-preview">Gemini 3 Flash (Fast)</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro (Powerful)</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
          </select>
        </div>
      </section>

      <section class="settings-group">
        <h2>Usage Statistics</h2>
        <div class="usage-grid">
          <div class="usage-item">
            <span class="usage-label">Total Calls</span>
            <span id="statTotalCalls" class="usage-value">0</span>
          </div>
          <div class="usage-item">
            <span class="usage-label">Tokens In</span>
            <span id="statTokensIn" class="usage-value">0</span>
          </div>
          <div class="usage-item">
            <span class="usage-label">Tokens Out</span>
            <span id="statTokensOut" class="usage-value">0</span>
          </div>
        </div>
        <button id="clearStatsBtn" class="secondary-btn" style="width: 100%; margin-top: 8px;">Clear History</button>
      </section>
    </main>
  </div>

  <div id="toast" class="hidden"></div>
  <script src="popup.js"></script>
</body>
</html>
